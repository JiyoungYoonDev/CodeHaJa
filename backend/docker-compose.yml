services:
  code-haja:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/code_haja_db

  db:
    image: postgres:latest
    container_name: code-haja-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_haja_db
    volumes:
      - ./postgres_data:/var/lib/postgresql
