spring.application.name=demo
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/code_haja_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# spring.jackson.property-naming-strategy=SNAKE_CASE
server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always
spring.docker.compose.enabled=false

springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.packages-to-scan=com.example.controller
springdoc.paths-to-match=/api/**

# JWT
app.jwt.secret=${JWT_SECRET:local_dev_jwt_secret_change_in_production}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# Cookie
app.cookie.secure=${APP_COOKIE_SECURE:false}
app.cookie.same-site=${APP_COOKIE_SAME_SITE:Lax}

# CORS
app.cors.extra-origins=${APP_CORS_EXTRA_ORIGINS:}

# Piston
piston.base-url=${PISTON_BASE_URL:http://localhost:2000}

# Default admin seed (only used if admins table is empty)
app.admin.seed.email=${ADMIN_SEED_EMAIL:admin@codehaja.com}
app.admin.seed.password=${ADMIN_SEED_PASSWORD:codehaja2026!}
app.admin.seed.name=${ADMIN_SEED_NAME:Admin}

# AI Generation
app.ai.provider=${AI_PROVIDER:gemini}

# Claude
app.ai.api-key=${ANTHROPIC_API_KEY:}
app.ai.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
app.ai.max-tokens=${ANTHROPIC_MAX_TOKENS:16384}

# Gemini
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.ai.gemini.max-tokens=${GEMINI_MAX_TOKENS:16384}

# AWS S3
aws.s3.bucket=${AWS_S3_BUCKET:codehaja}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.s3.access-key=${AWS_S3_ACCESS_KEY:}
aws.s3.secret-key=${AWS_S3_SECRET_KEY:}

# File upload limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB